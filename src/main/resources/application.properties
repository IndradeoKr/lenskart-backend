spring.application.name=shopwave
# Database configuration moved to AppConfig.java for robust parsing.

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#logger configurations
logging.level.root=INFO
logging.file.name=app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
# The production secret must be provided via the JWT_SECRET environment variable.
# A safe default fallback is configured for local development and testing purposes.
jwt.secret=${JWT_SECRET:default_local_dev_secret_key_that_is_at_least_256_bits_long_for_security}